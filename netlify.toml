# Netlify configuration for secure form handling
[build]
  publish = "."
  functions = "functions"

# Enable form detection and processing
[forms]
  # Enable Netlify Forms for the RSVP form
  rsvp = "rsvp.html"

# Redirects
[[redirects]]
  from = "/success"
  to = "/rsvp.html"
  status = 302
  force = false

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://media.giphy.com https://via.placeholder.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'"
