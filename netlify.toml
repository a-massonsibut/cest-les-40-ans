# Netlify configuration for secure form handling
[build]
  publish = "."
  functions = "functions"

# Enable form detection and processing
# Netlify will automatically detect forms with the 'netlify' attribute

# Redirects
[[redirects]]
  from = "/api/rsvp-counts"
  to = "/.netlify/functions/get-rsvp-counts-simple"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
